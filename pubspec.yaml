name: fitlog
description: "FitLog - Premium offline-first fitness tracker"
publish_to: 'none'
version: 0.2.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.3.1

  # Local Database (Drift = typed SQLite)
  drift: ^2.33.0
  drift_flutter: ^0.3.0
  sqlite3_flutter_libs: any
  path_provider: ^2.1.5
  path: ^1.9.1

  # Navigation
  go_router: ^17.2.3

  # UI & Fonts
  google_fonts: ^8.1.0
  
  # Calendar
  table_calendar: ^3.1.2

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.1

  # Security
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3
  device_info_plus: ^10.1.0

  # File Sharing
  share_plus: ^10.1.3
  
  # File Picker for imports
  file_picker: ^8.1.4
  flutter_local_notifications: ^22.0.0
  shared_preferences: ^2.5.5
  confetti: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.34.0
  build_runner: ^2.4.14
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
